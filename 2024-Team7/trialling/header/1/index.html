<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header 1</title>
    <link href="styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <header class="col-12 py-2 ps-2">
        <div class="row">
            <div class="header-logo-container col-3 col-sm-2 col-lg-1">
                <img src="Images/LogoBlack.png" alt="RBOCC Logo" class="header-logo">
            </div>
            <div class="header-title col-md-4 col-lg-3 d-md-flex align-items-center d-none">
                <p class="d-none d-md-block d-lg-none fs-1 fw-bold mb-0">
                    RBOCC
                </p>
                <p class="d-none d-lg-block fs-5 fw-bold mb-0">
                    Red Beach Outrigger Canoe Club
                </p>
            </div>
        </div>
    </header>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
